<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영수증</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-size:10pt;background:#f0f0f0}
.print-controls{background:#1e3a5f;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.print-controls h2{font-size:14px}
.page{width:148mm;background:#fff;margin:16px auto 0 auto;padding:15mm 10mm 10mm 10mm;box-shadow:0 4px 20px rgba(0,0,0,.15)}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #333;padding:3px 5px;vertical-align:middle;font-size:9pt}
.label{background:#f4f4f4;font-weight:700;text-align:center;white-space:nowrap}
input[type=text],input[type=date],input[type=number]{border:none;outline:none;width:100%;font-size:9pt;font-family:inherit;background:transparent;text-align:center}
input:focus{background:#fffde7}
.center{text-align:center}
.right{text-align:right}
.no-print{display:block}
@page{size:A5;margin:15mm 10mm 10mm 10mm}
@media print{
  .print-controls{display:none}
  .no-print{display:none!important}
  body{background:#fff;margin:0!important;padding:0!important;display:block!important;align-items:flex-start!important;justify-content:flex-start!important}
  .page{box-shadow:none;margin:0!important;padding:15mm 10mm 10mm 10mm;width:148mm;position:absolute;top:0;left:0}
  input{border-color:transparent!important;background:transparent!important}
  p{display:block!important;visibility:visible!important;font-size:9pt!important}
  table,tr,td,th{page-break-inside:avoid}
}
</style>
</head>

      </td>
      <td style="text-align:center;font-size:12pt;font-weight:900">
        ￦ <span id="rc-total-display">0</span>
      </td>
      <td><input type="text" id="rc-note"></td>
    </tr>

    <thead>
      <tr style="background:#e8e8e8">
        <th colspan="5" style="text-align:center;letter-spacing:6px;font-size:9.5pt">공 &nbsp;&nbsp; 급 &nbsp;&nbsp; 내 &nbsp;&nbsp; 역</th>
      </tr>

        <th style="width:55px;font-size:8.5pt">단 가</th>

      </tr>
    </tfoot>

  <p style="text-align:center;font-size:9pt;margin-bottom:8px;margin-top:4px;font-weight:600">위 금액을 영수(청구)함</p>

  <div class="no-print" style="text-align:center;margin-top:10px">
    <button onclick="window.print()" style="background:#ff6b00;color:#fff;border:none;padding:8px 24px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-right:8px">🖨️ 출력하기</button>
    <button onclick="window.close()" style="background:#6b7280;color:#fff;border:none;padding:8px 24px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer">✕ 닫기</button>
  </div>
</div>

<script>
document.getElementById('rc-date').value = new Date().toISOString().slice(0,10);
var now = new Date();

var rows='';
for(var i=1;i<=15;i++){
  rows+='<tr>'+
    '<td class="center" style="font-size:8.5pt"><input type="text" style="width:28px;font-size:8.5pt" value="'+(i===1?(now.getMonth()+1)+'/'+(now.getDate()):'')+'"></td>'+
    '<td><input type="text" class="rc-item" oninput="calcRC()" style="font-size:8.5pt"></td>'+
    '<td><input type="number" class="rc-qty" min="0" oninput="calcRC()" style="text-align:center;font-size:8.5pt"></td>'+
    '<td><input type="number" class="rc-price" min="0" oninput="calcRC()" style="text-align:right;font-size:8.5pt"></td>'+
    '<td class="right rc-amount" style="font-size:8.5pt"></td>'+
    '</tr>';
}
document.getElementById('rc-body').innerHTML=rows;

function calcRC(){
  var rows=document.querySelectorAll('#rc-body tr');
  var sum=0;
  rows.forEach(function(row){
    var q=parseFloat(row.querySelector('.rc-qty').value)||0;
    var p=parseFloat(row.querySelector('.rc-price').value)||0;
    var amt=q*p;
    row.querySelector('.rc-amount').textContent=amt>0?amt.toLocaleString():'';
    sum+=amt;
  });
  document.getElementById('rc-sum').textContent=sum>0?sum.toLocaleString():'';
  document.getElementById('rc-total-display').textContent=sum>0?sum.toLocaleString():'0';
}
</script>
