<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래명세서</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-size:10pt;background:#f0f0f0}
.print-controls{background:#1e3a5f;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.print-controls h2{font-size:14px}
.btn-print{background:#ff6b00;color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:700}
.page{width:210mm;background:#fff;margin:16px auto;padding:12mm 15mm;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.title{text-align:center;font-size:20pt;font-weight:900;letter-spacing:4px;margin-bottom:4px}
.subtitle{text-align:center;font-size:9pt;color:#666;margin-bottom:10px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #333;padding:6px 8px;vertical-align:middle;font-size:9.5pt;min-height:28px}
.label{background:#e8e8e8;font-weight:700;text-align:center;white-space:nowrap}
input[type=text],input[type=date],input[type=number]{border:none;outline:none;width:100%;font-size:9.5pt;font-family:inherit;background:transparent;text-align:center}
input:focus,textarea:focus{background:#fffde7}
textarea{border:none;outline:none;width:100%;font-family:inherit;font-size:9.5pt;background:transparent;resize:none;padding:2px}
.right{text-align:right}
.center{text-align:center}
.total-row{background:#f0f0f0;font-weight:700}
.sign-row{display:flex;align-items:center;justify-content:flex-end;gap:20px;margin-top:8px;font-size:9.5pt}
.sign-item{display:flex;align-items:center;gap:8px}
.sign-line{border-bottom:1px solid #999;width:100px;display:inline-block}
.no-print{display:block}
@page{margin:15mm 12mm 10mm 12mm}
@media print{
  .print-controls{display:none}
  .no-print{display:none!important}
  body{background:#fff}
  .page{box-shadow:none;margin:0;padding:0;width:100%}
  input,textarea{border-color:transparent!important;background:transparent!important}
}
</style>
</head>
<body>
<div class="print-controls">
  <h2>📄 거래명세서</h2>
  <button class="btn-print" onclick="window.print()">🖨️ 출력하기</button>
</div>
<div class="page">
  <div class="title">거 래 명 세 서</div>
  <div class="subtitle">(공급받는자용)</div>

  <!-- 거래일자 -->
  <table style="margin-bottom:6px">
    <tr>
      <td class="label" style="width:70px">거래일자</td>
      <td><input type="date" id="dn-date"></td>
      <td class="label" style="width:70px">문서번호</td>
      <td><input type="text" id="dn-no"></td>
    </tr>
  </table>

  <!-- 공급받는자 / 공급자 -->
  <table style="margin-bottom:6px">
    <colgroup>
      <col style="width:35px">
      <col style="width:75px">
      <col style="width:165px">
      <col style="width:35px">
      <col style="width:75px">
      <col style="width:165px">
    </colgroup>
    <tr>
      <td class="label" rowspan="4" style="font-size:11pt">공<br>급<br>받<br>는<br>자</td>
      <td class="label">상호(법인명)</td>
      <td style="white-space:normal;word-break:break-all;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <input type="text" id="buyer-name" style="flex:1;min-width:0;word-break:break-all">
          <span style="white-space:nowrap;font-weight:700;margin-left:4px">귀중</span>
        </div>
      </td>
      <td class="label" rowspan="4" style="font-size:11pt">공<br>급<br>자</td>
      <td class="label">등록번호</td>
      <td style="text-align:center">122 - 07 - 72711</td>
    </tr>
    <tr>
      <td class="label">사업장주소</td>
      <td style="padding:0;white-space:normal;word-break:break-all"><textarea id="buyer-addr" rows="1" style="width:100%;padding:4px;text-align:left;word-break:break-all;overflow-wrap:break-word;overflow:hidden"></textarea></td>
      <td class="label">상호(법인명)</td>
      <td style="text-align:center;white-space:normal;word-break:break-all">잉크스테이션</td>
    </tr>
    <tr>
      <td class="label">전화번호</td>
      <td style="overflow:hidden"><input type="text" id="buyer-tel" style="width:100%;word-break:break-all"></td>
      <td class="label">성명</td>
      <td>
        <div style="position:relative;display:flex;align-items:center;justify-content:flex-end;padding-right:56px">
          <span style="position:relative;z-index:1;white-space:nowrap">신 환 욱 &nbsp;(인)</span>
          <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCABgAGEDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD3+iims2FzkD60AKTioZrqC2x50qJk4G44ya53UvFCfbU06wZWlkbYZzyqE/zq7Y6FHFMLm9me9uR0kk6D6DtQW4OKvI2weM1DcNOsDmBUaXHyhzgE1R1XXbLSI/8ASJMyH7sa8saZo+uwazvWNHRkALBqL6h7OXLzW0Kcep+IkkIl0aORfWOX/GnHxSluCdQ067tVHVym5R+IrfPFc/4pvdQsLFLi0EJiDYlEi5yKVxwSnJRsa9lqVpqEIltZ0lQ91NW81xmmLBrwl/0Y6dexAZkgbGffFWX1bVdCmVNTj+12R4+1xLgp/vCgcqTTt1OroqGCeO4iWWKQPGwyrA5BFSg0zIWiiigBpYDjvXI+INdXzGs0Z2hXiXyjh3/2Qe3vWxr108Np5EEmy7uT5cP1PeuYv203SDHZ2sKXOoyYWVvvEE9/rQzow8E3qUoZJL3Um1C2gVY4BthQAADA7mhbHxDqM326G8acKSI/KnGFP0qm9tp08EdtPqc1rMrlZI1GVFaGjTtpnilbK3mMlkx2Z9TjrioPQlpflW3dGPczPLJJ9ubzLpGETtn7349q9I0DTotL0uONCGYjczDua4u0t7GbxFqVneBBby7jv3cgg5qXQdaey1hNPhuDc2bOUQnqPQ0k0tycRGVSHLHSyudmdYtpbaeW1zcNBnfEn3sjtiuL17xeuq6dNZW9pIrlhgtjHBqPWLt/D3jJrmL5Y5cGTngg9areIgIENydXhnkdg0cMUYHHviiUtGRhsPGM4tq9xNJ1HVEupDYfZ7d2QeYJ2AHHfJqbW5ddtxbNPqqSGYkiOAgrj+orO01tLCs+rGSUSHhU7H0pNXu7KXyIdPheC2gQgI/3sk5JqU/dO2dK+J0ibOi6pdaGC7rLcWJYGZwAFjLdMf1r0SCVJ4VkjYMjDIPrXLeE7WO68PTebBtS4Yg5/jGMZqfwxO1jPdaHOxL2zZiZjyyHp+VaR2PKxCUpyt0OnoooqjkOfYJf+LdpCstjDnOejt/9arLabYael1dxQIkjAu7nrnHX2qHRowb3VZ/lJe525HXAA4pPE0k66S0FvC8klwfLGB0+tJmq+JI4KG5sUZJ7uB7tUckKi/Lz3Zu59qvQqG8b28kar         </div>
      </td>
    </tr>
    <tr>
      <td class="label">담당자</td>
      <td style="overflow:hidden"><input type="text" id="buyer-person" style="width:100%"></td>
      <td class="label">주소</td>
      <td style="padding:0;white-space:normal;word-break:break-all"><textarea id="supp-addr" rows="1" style="width:100%;padding:4px;text-align:left;word-break:break-all;overflow-wrap:break-word;overflow:hidden">인천시 부평구 장제로222번길 25</textarea></td>
    </tr>
  </table>

  <!-- 합계금액 -->
  <table style="margin-bottom:6px">
    <tr>
      <td class="label" style="width:100px;font-size:11pt">합 계 금 액</td>
      <td style="font-size:13pt;font-weight:900;text-align:center">
        ￦ <span id="total-display">0</span> 원 &nbsp;(VAT 포함)
      </td>
    </tr>
  </table>

  <!-- 품목 테이블 -->
  <table style="margin-bottom:6px">
    <thead>
      <tr style="background:#e8e8e8">
        <th style="width:20px">월</th>
        <th style="width:20px">일</th>
        <th>품목명</th>
        <th style="width:75px">규격</th>
        <th style="width:40px">수량</th>
        <th style="width:75px">단가(원)</th>
        <th style="width:75px">금액(원)</th>
        <th style="width:75px">세액(원)</th>
        <th style="width:75px">비고</th>
      </tr>
    </thead>
    <tbody id="dn-body"></tbody>
    <tfoot>
      <tr class="total-row">
        <td colspan="6" class="center">합 &nbsp; 계</td>
        <td class="right" id="sum-amount">0</td>
        <td class="right" id="sum-vat">0</td>
        <td></td>
      </tr>
    </tfoot>
  </table>

  <!-- 하단 -->
  <table style="margin-bottom:10px">
    <tr>
      <td class="label" style="width:80px">세금계산서발행</td>
      <td class="center" colspan="1">
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;font-size:11px">
          <input type="radio" name="dn-vat" id="dn-vat-yes" value="yes" checked onchange="calcAll()" style="width:auto">
          <span style="color:#059669;font-weight:600">VAT(10%) 발행</span>
        </label>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;font-size:11px">
          <input type="radio" name="dn-vat" id="dn-vat-no" value="no" onchange="calcAll()" style="width:auto">
          <span style="color:#6b7280">부 (세액 없음)</span>
        </label>
      </td>
      <td class="label" style="width:50px">현금</td>
      <td><input type="text" id="dn-cash"></td>
      <td class="label" style="width:50px">신용</td>
      <td><input type="text" id="dn-credit"></td>
      <td class="label" style="width:50px">미수</td>
      <td><input type="text" id="dn-unpaid"></td>
    </tr>
  </table>

  <div class="sign-row">
    <div class="sign-item">납품자 &nbsp; <span class="sign-line"></span> &nbsp; (인)</div>
    <div class="sign-item">인수자 &nbsp; <span class="sign-line"></span> &nbsp; (인)</div>
  </div>

  <div class="no-print" style="text-align:center;margin-top:16px">
    <button onclick="window.print()" style="background:#ff6b00;color:#fff;border:none;padding:8px 24px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-right:8px">🖨️ 출력하기</button>
    <button onclick="window.close()" style="background:#6b7280;color:#fff;border:none;padding:8px 24px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer">✕ 닫기</button>
  </div>
</div>
<script>
document.getElementById('dn-date').value = new Date().toISOString().slice(0,10);
var now = new Date();

// textarea 자동 높이
['buyer-addr','supp-addr'].forEach(function(id){
  var el = document.getElementById(id);
  if(el){
    // 초기 높이 설정
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
    el.addEventListener('input', function(){
      this.style.height='auto';
      this.style.height=this.scrollHeight+'px';
    });
  }
});

var rows='';
for(var i=1;i<=15;i++){
  rows+='<tr>'+
    '<td class="center"><input type="text" style="width:25px" value="'+(i===1?now.getMonth()+1:'')+'"></td>'+
    '<td class="center"><input type="text" style="width:25px" value="'+(i===1?now.getDate():'')+'"></td>'+
    '<td><input type="text" class="item-name" oninput="calcAll()"></td>'+
    '<td><input type="text" class="item-spec"></td>'+
    '<td><input type="number" class="item-qty" value="" min="0" oninput="calcAll()" style="text-align:center"></td>'+
    '<td><input type="number" class="item-price" value="" min="0" oninput="calcAll()" style="text-align:right"></td>'+
    '<td class="right item-amount"></td>'+
    '<td class="right item-vat"></td>'+
    '<td><input type="text"></td>'+
    '</tr>';
}
document.getElementById('dn-body').innerHTML=rows;

function calcAll(){
  var isVat = document.getElementById('dn-vat-yes') ? document.getElementById('dn-vat-yes').checked : true;
  var rows=document.querySelectorAll('#dn-body tr');
  var sumA=0,sumV=0;
  rows.forEach(function(row){
    var q=parseFloat(row.querySelector('.item-qty').value)||0;
    var p=parseFloat(row.querySelector('.item-price').value)||0;
    var total=q*p;
    var supply, vat;
    if(isVat){
      supply=Math.round(total/1.1);
      vat=total-supply;
    } else {
      // VAT 미발행 - 세액 없음
      supply=total;
      vat=0;
    }
    row.querySelector('.item-amount').textContent=total>0?supply.toLocaleString():'';
    row.querySelector('.item-vat').textContent=total>0?vat.toLocaleString():'';
    sumA+=supply; sumV+=vat;
  });
  document.getElementById('sum-amount').textContent=sumA.toLocaleString();
  document.getElementById('sum-vat').textContent=sumV.toLocaleString();
  document.getElementById('total-display').textContent=(sumA+sumV).toLocaleString();
}
</script>
</body>
</html>
